name: Firebase Deploy

on:
  workflow_dispatch: # Allows maintainers to trigger deployment manually
  push:
    tags:
      - 'v*' # Triggers deployment when a release tag is pushed (e.g. v1.0.0)

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    # Safe Guard: Skip deployment if not in the official repo or if production secrets are missing
    if: github.repository == 'pavsoss/MediFlow' && secrets.FIREBASE_SERVICE_ACCOUNT != ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Production .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "ORS_API_KEY=${{ secrets.ORS_API_KEY }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.PROJECT_ID }}" >> .env
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.PROJECT_ID }}.firebaseapp.com" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.PROJECT_ID }}.firebasestorage.app" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Web Application
        run: flutter build web --release --base-href /

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci

      - name: Authenticate to Google Cloud / Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Production
        run: |
          firebase deploy \
            --only hosting,functions,firestore:rules,storage \
            --project ${{ secrets.PROJECT_ID }}
